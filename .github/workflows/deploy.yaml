name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build site
        run: python build.py

      - name: Assume IAM Role
        uses: bitterbridge/github-actions/assume-iam-role@v0.0.52
        with:
          role-to-assume: ${{ vars.IAM_ROLE_TO_ASSUME }}

      - name: Deploy to S3
        run: aws s3 sync public/ s3://darkdell.www --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ERL3QRNQL3Q5K --paths "/*"
