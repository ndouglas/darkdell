<div>
  {{ .Scratch.Get "list_item.headingOpen" | safeHTML }}
    <a href="{{ .Permalink }}">
      <strong>{{ .Title }}</strong>
    </a>
    {{ partial "link_project_icons.html" . }}
  {{ .Scratch.Get "list_item.headingClose" | safeHTML }}
  <p>
    <strong>{{ .Params.subtitle }}</strong>
  </p>
  <p>{{ .Summary }}</p>
  <p>{{ partial "list_project_tags.html" . }}</p>
  <a href="{{ .Permalink }}">Read more...</a>
</div>
