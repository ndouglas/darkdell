{{ partial "header.html" . }}
<body>
  <h1>{{ .Title }}</h1>
  {{ range first 10 .RegularPages }}
  <div>
    <h2>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      {{ partial "project/link_icons.html" . }}
    </h2>
    <b>{{ .Params.subtitle }}</b>
    <div>{{ .Summary }}</div>
    <a href="{{ .Permalink }}">Read more...</a>
  </div>
  {{ end }}
</body>
{{ partial "footer.html" . }}
